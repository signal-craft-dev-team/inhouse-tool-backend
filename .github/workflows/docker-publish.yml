name: Build, Push & Deploy

on:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/signal-craft-dev-team/inhouse-tool-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Compute Engine
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.INHOUSE_VM_HOST }}
          username: ${{ secrets.INHOUSE_VM_USER }}
          key: ${{ secrets.INHOUSE_VM_SSH_KEY }}
          script: |
            echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ env.IMAGE }}:latest
            docker stop backend || true
            docker rm backend || true
            docker run -d \
              --name backend \
              --restart always \
              -p 8000:8000 \
              --env-file ~/backend.env \
              -e GOOGLE_APPLICATION_CREDENTIALS=/app/sa.json \
              -v ~/inhouse-backend-sa.json:/app/sa.json:ro \
              ${{ env.IMAGE }}:latest
